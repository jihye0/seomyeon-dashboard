<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>서면실사 진행현황</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#f5f6f8; --card:#fff; --line:#e3e6ea; --text:#222; --muted:#888;
          --done:#2e7d32; --prog:#f9a825; --todo:#c62828; --accent:#1565c0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI','Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); }
  header { background:var(--accent); color:#fff; padding:18px 24px; }
  header h1 { margin:0; font-size:20px; }
  header .sub { font-size:12px; opacity:.85; margin-top:4px; }
  .wrap { max-width:1100px; margin:0 auto; padding:20px; }
  .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .card .k { font-size:12px; color:var(--muted); }
  .card .v { font-size:26px; font-weight:700; margin-top:6px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:20px; }
  .panel h2 { font-size:15px; margin:0 0 14px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  select { padding:6px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; }
  canvas { max-height:420px; }
  #byVerifierWrap { position:relative; width:100%; }
  #byVerifierWrap canvas { max-height:none; }
  table.risk { width:100%; border-collapse:collapse; font-size:13px; }
  table.risk th, table.risk td { padding:7px 10px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; }
  table.risk th { color:var(--muted); font-weight:600; text-align:right; background:#fafbfc; }
  table.risk th:first-child, table.risk td:first-child { text-align:left; }
  table.risk td.lv { text-align:center; font-weight:700; }
  tr.lv-danger td.lv { color:var(--todo); }
  tr.lv-warn   td.lv { color:#e07a00; }
  tr.lv-ok     td.lv { color:#607d8b; }
  tr.lv-good   td.lv { color:var(--accent); }
  tr.lv-done   td.lv { color:var(--done); }
  tr.lv-danger { background:#fef6f5; }
  tr.lv-good, tr.lv-done { background:#f4fbf5; }
  td.score { font-weight:700; }
  table.risk th.sortable { cursor:pointer; user-select:none; }
  .risk-controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  table.risk th.filter { padding:4px 6px; background:#fff; border-bottom:2px solid var(--line); }
  .risk-fil { width:100%; min-width:64px; padding:3px 6px; font-size:12px;
              border:1px solid var(--line); border-radius:4px; box-sizing:border-box; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:700; }
  .badge.danger { background:#fdecea; color:var(--todo); }
  .badge.warn   { background:#fff4e0; color:#b35a00; }
  .badge.ok     { background:#eceff1; color:#546e7a; }
  .badge.good   { background:#e7f0fb; color:var(--accent); }
  .badge.done   { background:#e8f5e9; color:var(--done); }
  .muted-note { font-size:12px; color:var(--muted); margin:-6px 0 12px; }
  @media(max-width:700px){ .cards{grid-template-columns:repeat(2,1fr);} }
</style>
</head>

    <div id="riskBody"></div>
  </div>

  <div class="panel">

          <option value="completed">완료 건수</option>
        </select>
      </label>
    </div>
    <canvas id="trend"></canvas>
  </div>
</div>

function sum(rows, key){ return rows.reduce((a,r)=> a + (r[key]||0), 0); }
function rate(part, whole){ return whole>0 ? Math.round(part/whole*1000)/10 : 0; }

const latest = DATA[DATA.length-1];
document.getElementById('latestLabel').textContent = latest ? latest.label : '-';

// 심사원 목록 (최신 스냅샷 기준, 배정 있는 사람만)
const verifiers = latest.rows.filter(r => (r.total||0) > 0).map(r => r.name);

// 요약 카드
(function(){
  const totalQ = sum(latest.rows,'total_q');
  const ansQ   = sum(latest.rows,'answered_q');
  const totalC = sum(latest.rows,'total');
  const doneC  = sum(latest.rows,'completed');
  const cards = [
    ['문항 입력률', rate(ansQ,totalQ)+'%'],
    ['건수 완료율', rate(doneC,totalC)+'%'],
    ['전체 배정 건수', totalC.toLocaleString()],
    ['활동 심사원', verifiers.length+'명'],
  ];
  document.getElementById('cards').innerHTML = cards.map(
    ([k,v])=>`<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
})();

// ── 진행 현황 & 위험도 (남은 문항 × 마감 임박 가중치) ──
(function(){
  const DAY = 86400000;
  const TODAY = new Date(); TODAY.setHours(0,0,0,0);
  const daysBetween = (a,b)=> Math.round((b-a)/DAY);
  function parseDate(s){ if(!s) return null; const d=new Date(s+'T00:00:00'); return isNaN(d)?null:d; }

  // 실사 속도(문항/일): 전체 기간 평균 = 지금까지 입력한 총 문항 ÷ 경과일수
  //   (첫 기록일 ~ 오늘). 위험 판정엔 안 쓰고 참고용으로만 표시.
  function velocityMap(){
    const map = {};
    if(DATA.length < 1) return map;
    const last = DATA[DATA.length-1];
    const lastDate = new Date(last.iso);
    const firstDate = new Date(DATA[0].iso);
    const days = Math.max(Math.round((lastDate-firstDate)/86400000), 1);
    last.rows.forEach(r=>{ map[r.name] = (r.answered_q||0)/days; });
    return map;
  }
  const vel = velocityMap();

  // 마감 임박 가중치: 마감이 가까울수록 큼 (마감일 없으면 1)
  function urgencyWeight(daysLeft){
    if(daysLeft===null) return 1;
    if(daysLeft < 0)  return 5;   // 기한 초과
    if(daysLeft <= 3) return 4;   // D-1 ~ D-3
    if(daysLeft <= 7) return 2;   // D-4 ~ D-7
    if(daysLeft <= 14) return 1;  // D-8 ~ D-14
    return 0.5;                   // D-15 이상
  }

  // 등급 경계 (위험 점수 기준) — 필요시 이 숫자만 바꾸면 됨
  const SCORE_DANGER = 200;
  const SCORE_WARN   = 60;
  const GOOD_RATE    = 80;   // 입력률 이상이면 '우수'

  const haveBreakdown = latest.rows.some(r=> r.dl_break && Object.keys(r.dl_break).length>0);

  const items = latest.rows.filter(r=>(r.total||0)>0).map(r=>{
    const remaining = Math.max((r.total_q||0)-(r.answered_q||0), 0);
    const ansRate = rate(r.answered_q, r.total_q);

    // 위험 점수 = Σ (건별 '일정상 뒤처진 문항' short × 마감 임박 가중치)
    //   short = 기간 경과율 대비 덜 입력한 문항 → 일정대로면 0 (배정 많아도 0)
    //   → "안 하는 정도"와 "마감 임박도"를 한 점수에 결합.
    const bd = r.dl_break || {};
    let score = 0, behindRemaining = 0, nearRemaining = 0;
    for(const d in bd){
      const cell = bd[d] || {rem:0, short:0};
      const dl = parseDate(d);
      const daysLeft = dl ? daysBetween(TODAY, dl) : null;
      score += (cell.short||0) * urgencyWeight(daysLeft);
      behindRemaining += (cell.short||0);
      if(daysLeft!==null && daysLeft<=7) nearRemaining += (cell.rem||0);
    }
    score = Math.round(score);

    let level, reason;
    if(remaining===0){ level='done'; reason='입력 완료'; }
    else if(ansRate>=GOOD_RATE || score===0){ level='good'; reason = score===0 ? '일정대로 진행' : '우수 (거의 완료)'; }
    else if(score>=SCORE_DANGER){ level='danger'; reason='크게 뒤처짐'; }
    else if(score>=SCORE_WARN){ level='warn'; reason='뒤처짐'; }
    else { level='ok'; reason='양호'; }

    const speed = (vel[r.name]!==undefined) ? Math.round(vel[r.name]*10)/10 : null;
    return {name:r.name, remaining, behindRemaining, nearRemaining, ansRate, score, speed, level, reason};
  });

  // 위험 점수 높은 순으로 전원 정렬 (잘하는 분은 자연히 아래로)
  items.sort((a,b)=> b.score-a.score);
  const cnt = lv => items.filter(i=>i.level===lv).length;

  const note = document.getElementById('riskNote');
  note.innerHTML = `오늘 ${TODAY.toISOString().slice(0,10)} 기준 · 위험 점수 = Σ(건별 일정상 뒤처진 문항 × 마감 임박 가중치) · `
    + `<span class="badge danger">심각 ${cnt('danger')}</span> `
    + `<span class="badge warn">주의 ${cnt('warn')}</span> `
    + `<span class="badge ok">양호 ${cnt('ok')}</span> `
    + `<span class="badge good">우수 ${cnt('good')}</span> `
    + `<span class="badge done">완료 ${cnt('done')}</span>`
    + (haveBreakdown ? '' : ' · ⚠️ 아직 일정 데이터가 없어 점수 0으로 표시됩니다 (다음 자동 업데이트부터 반영)');

  const lvLabel = {danger:'🔴 심각', warn:'⚠️ 주의', ok:'🟢 양호', good:'🏆 우수', done:'🏁 완료'};

  // 정렬 가능한 컬럼: [키, 라벨, 기본 방향(asc=오름차순)]
  const COLS = [
    ['name',            '심사원',            true ],
    ['level',           '등급',              false],
    ['score',           '위험 점수',          false],
    ['behindRemaining', '일정상<br>뒤처진 문항', false],
    ['remaining',       '남은 문항',          false],
    ['nearRemaining',   '임박 잔여<br>(D-7 이내)', false],
    ['ansRate',         '입력률',            true ],
    ['speed',           '실사 속도<br>(문항/일)', true ],
  ];
  const lvOrder = {danger:0, warn:1, ok:2, good:3, done:4};
  const FILT = {name:'text', level:'level'};   // 그 외는 숫자(num)
  let sortKey = 'score', sortAsc = false;

  function compare(a, b){
    if(sortKey==='name'){ return sortAsc ? a.name.localeCompare(b.name,'ko') : b.name.localeCompare(a.name,'ko'); }
    let va, vb;
    if(sortKey==='level'){ va=lvOrder[a.level]; vb=lvOrder[b.level]; }
    else { va=a[sortKey]; vb=b[sortKey];
           if(va===null||va===undefined) va = sortAsc ? Infinity : -Infinity;
           if(vb===null||vb===undefined) vb = sortAsc ? Infinity : -Infinity; }
    return sortAsc ? va-vb : vb-va;
  }

  // 숫자 필터: ">=100", "<50", ">0", "=0", 또는 그냥 "100"(= 이상)
  function numMatch(val, expr){
    expr = (expr||'').trim();
    if(!expr) return true;
    if(val===null||val===undefined) return false;
    const m = expr.match(/^(>=|<=|>|<|=)?\s*(-?\d+(?:\.\d+)?)$/);
    if(!m) return true;
    const op = m[1]||'>=', n = parseFloat(m[2]);
    if(op==='>=') return val>=n;
    if(op==='<=') return val<=n;
    if(op==='>')  return val>n;
    if(op==='<')  return val<n;
    return val==n;
  }

  function renderBody(){
    const fil = {};
    COLS.forEach(([k])=>{ const el=document.getElementById('fil-'+k); fil[k]= el ? el.value : ''; });

    let list = items.filter(i=>{
      for(const [k] of COLS){
        const f = fil[k]; if(!f) continue;
        const t = FILT[k] || 'num';
        if(t==='text'){ if(!i.name.toLowerCase().includes(f.trim().toLowerCase())) return false; }
        else if(t==='level'){ if(i.level!==f) return false; }
        else { if(!numMatch(i[k], f)) return false; }
      }
      return true;
    });
    list.sort(compare);

    document.getElementById('riskTbody').innerHTML =
      list.length===0 ? `<tr><td colspan="${COLS.length}" style="text-align:center;color:#888;padding:16px">조건에 맞는 심사원이 없습니다</td></tr>`
      : list.map(i=>`
        <tr class="lv-${i.level}">
          <td>${i.name}</td>
          <td class="lv">${lvLabel[i.level]}</td>
          <td class="score">${i.score}</td>
          <td>${i.behindRemaining||0}</td>
          <td>${i.remaining}</td>
          <td>${i.nearRemaining||0}</td>
          <td>${i.ansRate}%</td>
          <td>${i.speed===null?'-':i.speed}</td>
        </tr>`).join('');

    // 정렬 화살표 갱신
    COLS.forEach(([k])=>{
      const sp = document.getElementById('arr-'+k);
      if(sp) sp.textContent = (k===sortKey) ? (sortAsc?' ▲':' ▼') : '';
    });
  }

  // 머리글(제목) 행 + 필터 행 — 한 번만 만들고 본문(tbody)만 갱신해 입력 포커스 유지
  const titleRow = COLS.map(([k,label])=>
    `<th class="sortable" data-key="${k}">${label}<span id="arr-${k}"></span></th>`).join('');
  const filterRow = COLS.map(([k])=>{
    const t = FILT[k] || 'num';
    if(t==='text') return `<th class="filter"><input class="risk-fil" id="fil-${k}" type="text" placeholder="검색"></th>`;
    if(t==='level') return `<th class="filter"><select class="risk-fil" id="fil-${k}">`
      + `<option value="">전체</option><option value="danger">🔴 심각</option><option value="warn">⚠️ 주의</option>`
      + `<option value="ok">🟢 양호</option><option value="good">🏆 우수</option><option value="done">🏁 완료</option></select></th>`;
    return `<th class="filter"><input class="risk-fil" id="fil-${k}" type="text" placeholder="예: >=100"></th>`;
  }).join('');

  document.getElementById('riskBody').innerHTML = `
    <div class="risk-controls"><span class="muted-note" style="margin:0">※ 칸별로 필터 입력 · 숫자칸은 «>=100», «<50», «=0» 가능 · 제목 클릭 시 정렬</span></div>
    <table class="risk">
      <thead>
        <tr>${titleRow}</tr>
        <tr>${filterRow}</tr>
      </thead>
      <tbody id="riskTbody"></tbody>
    </table>`;

  // 정렬: 제목 클릭 (필터 입력란 클릭은 제외)
  document.querySelectorAll('#riskBody th.sortable').forEach(th=>{
    th.addEventListener('click', ()=>{
      const k = th.dataset.key;
      if(k===sortKey){ sortAsc = !sortAsc; }
      else { sortKey = k; sortAsc = COLS.find(c=>c[0]===k)[2]; }
      renderBody();
    });
  });
  // 필터 입력 → 본문만 갱신
  COLS.forEach(([k])=>{
    const el = document.getElementById('fil-'+k);
    if(!el) return;
    el.addEventListener('input', renderBody);
    el.addEventListener('change', renderBody);
  });
  renderBody();
})();

// ── 심사원별 진행률 (가로 막대) ──
let barChart;
function drawBar(){
  const metric = document.getElementById('sortMetric').value;
  const rows = latest.rows.filter(r => (r.total||0) > 0).map(r => ({
    name: r.name,
    answer_rate: rate(r.answered_q, r.total_q),
    complete_rate: rate(r.completed, r.total),
    total: r.total||0,
    completed: r.completed||0,
    in_progress: r.in_progress||0,
    not_started: r.not_started||0,
  }));
  rows.sort((a,b)=> b[metric]-a[metric]);
  const labels = rows.map(r=>r.name);
  const ctx = document.getElementById('byVerifier');
  // 심사원 수에 비례해 캔버스 높이를 늘려 이름이 모두 보이도록 함
  document.getElementById('byVerifierWrap').style.height = (rows.length*32 + 60) + 'px';
  if(barChart) barChart.destroy();

  let datasets;
  if(metric==='total'){
    datasets = [
      {label:'완료', data:rows.map(r=>r.completed), backgroundColor:'#2e7d32', stack:'s'},
      {label:'진행중', data:rows.map(r=>r.in_progress), backgroundColor:'#f9a825', stack:'s'},
      {label:'미시작', data:rows.map(r=>r.not_started), backgroundColor:'#c62828', stack:'s'},
    ];
  } else {
    datasets = [{label: metric==='answer_rate'?'문항 입력률(%)':'건수 완료율(%)',
                 data: rows.map(r=>r[metric]),
                 backgroundColor:'#1565c0'}];
  }
  barChart = new Chart(ctx, {
    type:'bar',
    data:{labels, datasets},
    options:{indexAxis:'y', responsive:true, maintainAspectRatio:false,
      scales:{x:{stacked:metric==='total', beginAtZero:true,
                 max: metric==='total'?undefined:100},
              y:{stacked:metric==='total',
                 ticks:{autoSkip:false, font:{size:12}}}},
      plugins:{legend:{display:metric==='total'}}}
  });
}

// ── 날짜별 추이 (라인) ──
let trendChart;
function valFor(rows, who, metric){
  let src = who==='__ALL__' ? rows : rows.filter(r=>r.name===who);
  const tq=sum(src,'total_q'), aq=sum(src,'answered_q'),
        tc=sum(src,'total'), dc=sum(src,'completed');
  if(metric==='answer_rate') return rate(aq,tq);
  if(metric==='complete_rate') return rate(dc,tc);
  if(metric==='answered_q') return aq;
  if(metric==='completed') return dc;
}
function drawTrend(){
  const who = document.getElementById('trendVerifier').value;
  const metric = document.getElementById('trendMetric').value;
  const labels = DATA.map(s=>s.label);
  const vals = DATA.map(s=>valFor(s.rows, who, metric));
  const ctx = document.getElementById('trend');
  if(trendChart) trendChart.destroy();
  const isPct = metric.endsWith('rate');
  trendChart = new Chart(ctx, {
    type:'line',
    data:{labels, datasets:[{label: who==='__ALL__'?'전체':who,
            data:vals, borderColor:'#1565c0', backgroundColor:'rgba(21,101,192,.1)',
            fill:true, tension:.25, pointRadius:3}]},
    options:{responsive:true,
      scales:{y:{beginAtZero:true, max: isPct?100:undefined}},
      plugins:{legend:{display:false}}}
  });
}

// 셀렉트 채우기
const tv = document.getElementById('trendVerifier');
verifiers.forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; tv.appendChild(o); });

['sortMetric'].forEach(id=>document.getElementById(id).addEventListener('change', drawBar));
['trendVerifier','trendMetric'].forEach(id=>document.getElementById(id).addEventListener('change', drawTrend));

drawBar();
drawTrend();
</script>
