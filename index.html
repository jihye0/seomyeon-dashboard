<style>
  :root { --bg:#eef1f7; --card:#fff; --line:#e2e7f0; --text:#27314c; --muted:#8591a8;
          --done:#2f8a63; --prog:#d4982f; --todo:#d04f57; --accent:#2f4d8f; --accent2:#1f366c;
          --shadow:0 1px 3px rgba(25,40,80,.06), 0 8px 24px rgba(25,45,95,.08); }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Pretendard','Pretendard Variable','Segoe UI','Malgun Gothic',sans-serif;
         background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  header { background:linear-gradient(120deg,#26396b 0%,#16244a 100%); color:#fff; padding:26px 24px 30px;
           box-shadow:0 6px 22px rgba(20,35,75,.25); }
  header .inner { max-width:1100px; margin:0 auto; }
  header h1 { margin:0; font-size:22px; font-weight:800; letter-spacing:-.4px; }
  header .sub { font-size:12.5px; opacity:.82; margin-top:6px; }
  .wrap { max-width:1100px; margin:0 auto; padding:22px 20px 40px; }
  .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:-44px 0 22px; }
  .card { background:var(--card); border-radius:14px; padding:18px 18px 16px; box-shadow:var(--shadow);
          border:1px solid rgba(231,234,240,.7); transition:transform .15s ease, box-shadow .15s ease; }
  .card:hover { transform:translateY(-2px); box-shadow:0 4px 10px rgba(20,30,55,.08),0 12px 28px rgba(20,30,55,.08); }
  .card .k { font-size:12px; color:var(--muted); font-weight:600; }
  .card .v { font-size:30px; font-weight:800; margin-top:8px; letter-spacing:-1px; color:var(--accent2); }
  .panel { background:var(--card); border-radius:16px; padding:22px; margin-bottom:22px; box-shadow:var(--shadow);
           border:1px solid rgba(231,234,240,.7); }
  .panel h2 { font-size:16px; margin:0 0 16px; font-weight:800; letter-spacing:-.3px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  select, input.risk-search { padding:7px 11px; border:1px solid var(--line); border-radius:9px; font-size:14px;
           background:#fff; color:var(--text); font-family:inherit; outline:none; transition:border-color .12s; }
  select:focus, input.risk-search:focus { border-color:var(--accent); }
  canvas { max-height:420px; }
  #byVerifierWrap { position:relative; width:100%; }
  #byVerifierWrap canvas { max-height:none; }
  table.risk { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; }
  table.risk th, table.risk td { padding:9px 11px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; }
  table.risk thead th { position:sticky; top:0; color:var(--muted); font-weight:700; font-size:12px; text-align:right;
           background:#f7f9fc; border-bottom:2px solid var(--line); z-index:1; }
  table.risk th:first-child, table.risk td:first-child { text-align:left; padding-left:14px; }
  table.risk td:first-child { font-weight:700; }
  table.risk tbody tr { transition:background .1s; }
  table.risk tbody tr:hover { background:#f1f5ff !important; }
  table.risk td.lv { text-align:center; }
  td.lv span.pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
  tr.lv-danger td.lv span.pill { background:#fdecea; color:var(--todo); }
  tr.lv-warn   td.lv span.pill { background:#fff3e0; color:#c2410c; }
  tr.lv-ok     td.lv span.pill { background:#eef1f5; color:#5b6675; }
  tr.lv-good   td.lv span.pill { background:#e7f0fe; color:var(--accent); }
  tr.lv-done   td.lv span.pill { background:#e8f5e9; color:var(--done); }
  tr.lv-danger { background:#fffaf9; }
  tr.lv-good, tr.lv-done { background:#f6fcf7; }
  td.score { font-weight:800; color:var(--accent2); }
  tr.lv-danger td.score { color:var(--todo); }
  table.risk th.sortable { cursor:pointer; user-select:none; }
  table.risk th.sortable:hover { color:var(--accent); }
  .risk-controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
  .badge.danger { background:#fdecea; color:var(--todo); }
  .badge.warn   { background:#fff3e0; color:#c2410c; }
  .badge.ok     { background:#eef1f5; color:#5b6675; }
  .badge.good   { background:#e7f0fe; color:var(--accent); }
  .badge.done   { background:#e8f5e9; color:var(--done); }
  .muted-note { font-size:12px; color:var(--muted); margin:-4px 0 14px; line-height:1.7; }
  @media(max-width:700px){ .cards{grid-template-columns:repeat(2,1fr); margin-top:-40px;} .wrap{padding:18px 14px 30px;} }
</style>

function sum(rows, key){ return rows.reduce((a,r)=> a + (r[key]||0), 0); }
function rate(part, whole){ return whole>0 ? Math.round(part/whole*1000)/10 : 0; }

const latest = DATA[DATA.length-1];
document.getElementById('latestLabel').textContent = latest ? latest.label : '-';

// 심사원 목록 (최신 스냅샷 기준, 배정 있는 사람만)
const verifiers = latest.rows.filter(r => (r.total||0) > 0).map(r => r.name);

(function(){
  const totalQ = sum(latest.rows,'total_q');
  const ansQ   = sum(latest.rows,'answered_q');

  const cards = [
    ['문항 입력률', rate(ansQ,totalQ)+'%'],

  ];

})();

// ── 진행 현황 & 위험도 (남은 문항 × 마감 임박 가중치) ──
(function(){
  const DAY = 86400000;
  // 위험 점수 기준일 = 데이터 최종 업데이트 날짜 (최종 업데이트와 항상 일치)
  const TODAY = new Date('2026-07-23' + 'T00:00:00'); TODAY.setHours(0,0,0,0);
  const fmtDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const daysBetween = (a,b)=> Math.round((b-a)/DAY);
  function parseDate(s){ if(!s) return null; const d=new Date(s+'T00:00:00'); return isNaN(d)?null:d; }

  // 실사 속도(문항/일): 전체 기간 평균 = 지금까지 입력한 총 문항 ÷ 경과일수
  //   (첫 기록일 ~ 오늘). 위험 판정엔 안 쓰고 참고용으로만 표시.
  function velocityMap(){
    const map = {};
    if(DATA.length < 1) return map;
    const last = DATA[DATA.length-1];
    const lastDate = new Date(last.iso);
    const firstDate = new Date(DATA[0].iso);
    const days = Math.max(Math.round((lastDate-firstDate)/86400000), 1);
    last.rows.forEach(r=>{ map[r.name] = (r.answered_q||0)/days; });
    return map;
  }
  const vel = velocityMap();

  // 마감 임박 가중치: 마감이 가까울수록 큼 (마감일 없으면 1)
  function urgencyWeight(daysLeft){
    if(daysLeft===null) return 1;
    if(daysLeft < 0)  return 5;   // 기한 초과
    if(daysLeft <= 3) return 4;   // D-1 ~ D-3
    if(daysLeft <= 7) return 2;   // D-4 ~ D-7
    if(daysLeft <= 14) return 1;  // D-8 ~ D-14
    return 0.5;                   // D-15 이상
  }

  // 등급 경계 (위험 점수 기준) — 필요시 이 숫자만 바꾸면 됨
  // 위험 점수 = 배정량 대비 임박 가중 뒤처짐 비율(%). 규모 편향 없음.
  const SCORE_DANGER = 10;
  const SCORE_WARN   = 6;
  const GOOD_RATE    = 80;   // 입력률 이상이면 '우수'

  const haveBreakdown = latest.rows.some(r=> r.dl_break && Object.keys(r.dl_break).length>0);
  const haveGroups = latest.rows.some(r=> r.groups && Object.keys(r.groups).length>0);

  // 선택한 프로젝트 그룹에 맞는 수치 (전체 / 오토에버 / 현대차그룹)
  function statsFor(r, group){
    if(group==='auto' || group==='hyundai'){
      const g = (r.groups||{})[group] || {};
      return {total_q:g.total_q||0, answered_q:g.answered_q||0, dl_break:g.dl_break||{}};
    }
    return {total_q:r.total_q||0, answered_q:r.answered_q||0, dl_break:r.dl_break||{}};
  }

  function computeItems(group){
    return latest.rows.map(r=>{
      const s = statsFor(r, group);
      if((s.total_q||0)<=0) return null;   // 이 그룹에 배정 없으면 제외
      const remaining = Math.max(s.total_q - s.answered_q, 0);
      const ansRate = rate(s.answered_q, s.total_q);

      // 위험 점수 = Σ (건별 '일정상 뒤처진 문항' short × 마감 임박 가중치)
      const bd = s.dl_break || {};
      let score = 0, behindRemaining = 0, nearRemaining = 0, overdueRem = 0;
      for(const d in bd){
        const cell = bd[d] || {rem:0, short:0};
        const dl = parseDate(d);
        const daysLeft = dl ? daysBetween(TODAY, dl) : null;
        score += (cell.short||0) * urgencyWeight(daysLeft);
        behindRemaining += (cell.short||0);
        if(daysLeft!==null && daysLeft<=3) nearRemaining += (cell.rem||0);
        if(daysLeft!==null && daysLeft<0)  overdueRem += (cell.rem||0);  // 기한 초과 미완료
      }
      // 배정량 대비 비율로 정규화 (×100) — 배정 크기가 큰 사람이 불리하던 편향 제거
      score = s.total_q > 0 ? Math.round(score / s.total_q * 1000) / 10 : 0;

      let level, reason;
      if(remaining===0){ level='done'; reason='입력 완료'; }
      else if(score>=SCORE_DANGER){ level='danger'; reason='크게 뒤처짐'; }
      else if(score>=SCORE_WARN){ level='warn'; reason='뒤처짐'; }
      else if(ansRate>=GOOD_RATE || score===0){ level='good'; reason = score===0 ? '일정대로 진행' : '우수 (거의 완료)'; }
      else { level='ok'; reason='양호'; }

      const speed = (vel[r.name]!==undefined) ? Math.round(vel[r.name]*10)/10 : null;
      return {name:r.name, assigned:r.total||0, remaining, behindRemaining, nearRemaining, overdueRem, ansRate, score, speed, level, reason};
    }).filter(Boolean);
  }

  let currentItems = [];
  const note = document.getElementById('riskNote');
  function updateNote(){
    const cnt = lv => currentItems.filter(i=>i.level===lv).length;
    note.innerHTML = `오늘 ${fmtDate(TODAY)} 기준 · 위험 점수 = Σ(건별 일정상 뒤처진 문항 × 마감 임박 가중치) ÷ 배정 문항 × 100 (배정량 대비 비율) · `
      + `<span class="badge danger">심각 ${cnt('danger')}</span> `
      + `<span class="badge warn">주의 ${cnt('warn')}</span> `
      + `<span class="badge ok">양호 ${cnt('ok')}</span> `
      + `<span class="badge good">우수 ${cnt('good')}</span> `
      + `<span class="badge done">완료 ${cnt('done')}</span>`
      + (haveBreakdown ? '' : ' · ⚠️ 아직 일정 데이터가 없어 점수 0으로 표시됩니다 (다음 자동 업데이트부터 반영)');
  }

  const lvLabel = {danger:'🔴 심각', warn:'⚠️ 주의', ok:'🟢 양호', good:'🏆 우수', done:'🏁 완료'};

  // 정렬 가능한 컬럼: [키, 라벨, 기본 방향(asc=오름차순)]
  const COLS = [
    ['name',            '심사원',            true ],
    ['level',           '등급',              false],
    ['assigned',        '배정 건수',          false],
    ['score',           '위험 점수',          false],
    ['remaining',       '남은 문항',          false],
    ['nearRemaining',   '임박 잔여<br>(D-3 이내)', false],
    ['ansRate',         '입력률',            true ],
    ['speed',           '실사 속도<br>(문항/일)', true ],
  ];
  const lvOrder = {danger:0, warn:1, ok:2, good:3, done:4};
  let sortKey = 'score', sortAsc = false;

  function compare(a, b){
    if(sortKey==='name'){ return sortAsc ? a.name.localeCompare(b.name,'ko') : b.name.localeCompare(a.name,'ko'); }
    let va, vb;
    if(sortKey==='level'){ va=lvOrder[a.level]; vb=lvOrder[b.level]; }
    else { va=a[sortKey]; vb=b[sortKey];
           if(va===null||va===undefined) va = sortAsc ? Infinity : -Infinity;
           if(vb===null||vb===undefined) vb = sortAsc ? Infinity : -Infinity; }
    return sortAsc ? va-vb : vb-va;
  }

  function renderBody(){
    const lvFilter = document.getElementById('riskLevelFilter').value;
    const q = document.getElementById('riskSearch').value.trim().toLowerCase();
    // '추가 배정 후보' = 기한초과 0 & 위험 낮음(≤3, 일정 앞섬) & 입력률 높음(≥60%)
    const isSpare = i => i.overdueRem===0 && i.score<=3 && i.ansRate>=60;
    let list = currentItems.filter(i =>
      (lvFilter===''      ? true
       : lvFilter==='spare' ? isSpare(i)
       : i.level===lvFilter) &&
      (q==='' || i.name.toLowerCase().includes(q))
    );
    list.sort(compare);

    document.getElementById('riskTbody').innerHTML =
      list.length===0 ? `<tr><td colspan="${COLS.length}" style="text-align:center;color:#888;padding:16px">조건에 맞는 심사원이 없습니다</td></tr>`
      : list.map(i=>`
        <tr class="lv-${i.level}">
          <td>${i.name}${i.overdueRem>0 ? ` <span class="overdue-dot" style="cursor:help;font-size:11px" title="기한 초과 미완료 ${i.overdueRem}문항">🔴</span>` : ''}</td>
          <td class="lv"><span class="pill">${lvLabel[i.level]}</span></td>
          <td>${i.assigned||0}</td>
          <td class="score">${i.score}</td>
          <td>${i.remaining}</td>
          <td>${i.nearRemaining||0}</td>
          <td>${i.ansRate}%</td>
          <td>${i.speed===null?'-':i.speed}</td>
        </tr>`).join('');

    COLS.forEach(([k])=>{
      const sp = document.getElementById('arr-'+k);
      if(sp) sp.textContent = (k===sortKey) ? (sortAsc?' ▲':' ▼') : '';
    });
  }

  // 머리글은 한 번만 만들고 본문(tbody)만 갱신
  const titleRow = COLS.map(([k,label])=>
    `<th class="sortable" data-key="${k}">${label}<span id="arr-${k}"></span></th>`).join('');

  document.getElementById('riskBody').innerHTML = `
    <div class="risk-controls">
      <label>프로젝트:
        <select id="riskProject">
          <option value="">전체</option>
          <option value="auto">오토에버</option>
          <option value="hyundai">현대차그룹 (기초·표준)</option>
        </select>
      </label>
      <label>등급:
        <select id="riskLevelFilter">
          <option value="">전체</option>
          <option value="danger">🔴 심각</option>
          <option value="warn">⚠️ 주의</option>
          <option value="ok">🟢 양호</option>
          <option value="good">🏆 우수</option>
          <option value="done">🏁 완료</option>
          <option value="spare">➕ 추가 배정 후보</option>
        </select>
      </label>
      <input class="risk-search" id="riskSearch" type="text" placeholder="심사원 이름 검색">
      <span class="muted-note" style="margin:0">※ 표 머리글을 클릭하면 정렬돼요</span>
    </div>
    <table class="risk">
      <thead><tr>${titleRow}</tr></thead>
      <tbody id="riskTbody"></tbody>
    </table>`;

  // 프로젝트 그룹 바뀌면 점수 다시 계산
  function refresh(){
    currentItems = computeItems(document.getElementById('riskProject').value);
    updateNote();
    renderBody();
  }

  document.querySelectorAll('#riskBody th.sortable').forEach(th=>{
    th.addEventListener('click', ()=>{
      const k = th.dataset.key;
      if(k===sortKey){ sortAsc = !sortAsc; }
      else { sortKey = k; sortAsc = COLS.find(c=>c[0]===k)[2]; }
      renderBody();
    });
  });
  const projSel = document.getElementById('riskProject');
  if(!haveGroups) projSel.disabled = true;   // 옛 데이터엔 그룹 정보 없음
  projSel.addEventListener('change', refresh);
  document.getElementById('riskLevelFilter').addEventListener('change', renderBody);
  document.getElementById('riskSearch').addEventListener('input', renderBody);
  refresh();
})();

// ── 심사원별 진행률 (가로 막대) ──
let barChart;
function drawBar(){
  const metric = document.getElementById('sortMetric').value;
  const rows = latest.rows.filter(r => (r.total||0) > 0).map(r => ({
    name: r.name,
    answer_rate: rate(r.answered_q, r.total_q),
    complete_rate: rate(r.completed, r.total),
    total: r.total||0,
    completed: r.completed||0,
    in_progress: r.in_progress||0,
    not_started: r.not_started||0,
  }));
  rows.sort((a,b)=> b[metric]-a[metric]);
  const labels = rows.map(r=>r.name);
  const ctx = document.getElementById('byVerifier');
  // 심사원 수에 비례해 캔버스 높이를 늘려 이름이 모두 보이도록 함
  document.getElementById('byVerifierWrap').style.height = (rows.length*32 + 60) + 'px';
  if(barChart) barChart.destroy();

  let datasets;
  if(metric==='total'){
    datasets = [
      {label:'완료', data:rows.map(r=>r.completed), backgroundColor:'#4f9e7a', stack:'s'},
      {label:'진행중', data:rows.map(r=>r.in_progress), backgroundColor:'#e0ab4d', stack:'s'},
      {label:'미시작', data:rows.map(r=>r.not_started), backgroundColor:'#d77a82', stack:'s'},
    ];
  } else {
    datasets = [{label: metric==='answer_rate'?'문항 입력률(%)':'건수 완료율(%)',
                 data: rows.map(r=>r[metric]),
                 backgroundColor:'#3a5a9c', borderRadius:4}];
  }
  barChart = new Chart(ctx, {
    type:'bar',
    data:{labels, datasets},
    options:{indexAxis:'y', responsive:true, maintainAspectRatio:false,
      scales:{x:{stacked:metric==='total', beginAtZero:true,
                 max: metric==='total'?undefined:100},
              y:{stacked:metric==='total',
                 ticks:{autoSkip:false, font:{size:12}}}},
      plugins:{legend:{display:metric==='total'}}}
  });
}

// ── 날짜별 추이 (라인) ──
let trendChart;
function valFor(rows, who, metric){
  let src = who==='__ALL__' ? rows : rows.filter(r=>r.name===who);
  const tq=sum(src,'total_q'), aq=sum(src,'answered_q'),
        tc=sum(src,'total'), dc=sum(src,'completed');
  if(metric==='answer_rate') return rate(aq,tq);
  if(metric==='complete_rate') return rate(dc,tc);
  if(metric==='answered_q') return aq;
  if(metric==='completed') return dc;
}
function drawTrend(){
  const who = document.getElementById('trendVerifier').value;
  const metric = document.getElementById('trendMetric').value;
  const labels = DATA.map(s=>s.label);
  const vals = DATA.map(s=>valFor(s.rows, who, metric));
  const ctx = document.getElementById('trend');
  if(trendChart) trendChart.destroy();
  const isPct = metric.endsWith('rate');
  trendChart = new Chart(ctx, {
    type:'line',
    data:{labels, datasets:[{label: who==='__ALL__'?'전체':who,
            data:vals, borderColor:'#2f4d8f', backgroundColor:'rgba(47,77,143,.12)',
            fill:true, tension:.25, pointRadius:3, pointBackgroundColor:'#2f4d8f'}]},
    options:{responsive:true,
      scales:{y:{beginAtZero:true, max: isPct?100:undefined}},
      plugins:{legend:{display:false}}}
  });
}

// 셀렉트 채우기
const tv = document.getElementById('trendVerifier');
verifiers.forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; tv.appendChild(o); });

['sortMetric'].forEach(id=>document.getElementById(id).addEventListener('change', drawBar));
['trendVerifier','trendMetric'].forEach(id=>document.getElementById(id).addEventListener('change', drawTrend));

drawBar();
drawTrend();
</script>
</body>
